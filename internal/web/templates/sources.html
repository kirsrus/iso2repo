<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iso2repo</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: #1a1a1a;
            background-color: #f5f5f5;
            padding: 32px;
        }

        .container {
            max-width: 800px;
            margin: 0;
            padding: 0;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #d0d0d0;
        }

        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 14px;
            padding: 0;
            border: 1px solid #d0d0d0;
            border-radius: 2px;
            background-color: transparent;
            color: #bbb;
            font-size: 9px;
            line-height: 1;
            cursor: pointer;
            transition: color 0.15s ease, border-color 0.15s ease;
            user-select: none;
        }

        .copy-btn:hover {
            color: #888;
            border-color: #bbb;
        }

        .copy-btn.copied {
            color: #2e7d32;
            border-color: #2e7d32;
            background-color: #e8f5e9;
        }

        pre {
            background-color: #ffffff;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            padding: 14px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 12px;
            line-height: 1.6;
            overflow-x: auto;
            white-space: pre;
            tab-size: 4;
            color: #2e7d32;
        }

        .empty-state {
            padding: 32px 14px;
            text-align: left;
            color: #888;
            font-size: 14px;
        }

        .footer {
            margin-top: 24px;
            padding-top: 12px;
            border-top: 1px solid #d0d0d0;
            font-size: 12px;
            color: #aaa;
        }

        .footer a {
            color: #888;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>sources.list</h1>

        {{if .Text}}
        <div class="header-bar">
            <span style="font-size: 12px; color: #888;">Все строки закомментированы (#). Раскомментируйте нужные.</span>
            <button class="copy-btn" id="copy-btn" title="Скопировать в буфер обмена" onclick="copySources()">📋</button>
        </div>
        <pre id="sources-text">{{.Text}}</pre>
        {{else}}
        <div class="empty-state">Нет доступных репозиториев.</div>
        {{end}}

        <script>
            function copySources() {
                var text = document.getElementById('sources-text').textContent;
                navigator.clipboard.writeText(text).then(function() {
                    var btn = document.getElementById('copy-btn');
                    btn.textContent = '✓';
                    btn.classList.add('copied');
                    setTimeout(function() {
                        btn.textContent = '📋';
                        btn.classList.remove('copied');
                    }, 2000);
                });
            }
        </script>

        <div class="footer"><a href="/">← К списку репозиториев</a></div>
    </div>
</body>
</html>
